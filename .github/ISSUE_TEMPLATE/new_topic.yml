name: Topic/Article Request
description: Suggest an idea for a new knowledgebase topic or article
title: "feat: "
labels: enhancement
body:
  - type: dropdown
    id: program
    attributes:
      label: What program does this pertain to?
      options:
        - FTC
        - FRC
        - Both
    validations: 
      required: true
  - type: textarea
    id: topic
    attributes:
      label: Please describe the topic.
      description: Briefly, what topic would you like to see added to the knowledgebase?
      placeholder: ex. Add steps to describe setup of [....]
    validations:
      required: true
  - type: textarea
    id: topic-desc
    attributes:
      label: Additional content information
      description: If you have any specific points you would like to be included in the guide(e.g., particular action, textual or screenshot content), please specify that here. If you have any drafts, please also include them here.
    validations:
      required: false
